<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - EV Recharge Bunk</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="../index.html" class="navbar-brand" style="justify-content: center; margin-bottom: 1.5rem;">
          <div class="navbar-brand-icon">EV</div>
          <span class="navbar-brand-text">Recharge Bunk</span>
        </a>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your admin account</p>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" class="form-control" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
      </form>
      
      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none;">Register</a>
      </p>
      <p style="text-align: center; margin-top: 0.75rem;">
        <a href="../index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Back to Home</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { auth, db, Logger } from '../shared/utils.js';
    import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { ref, onValue } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    const logger = new Logger('AdminLogin');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        logger.log('Admin login attempt', { email });
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        onValue(ref(db, 'users/' + user.uid), (snapshot) => {
          const userData = snapshot.val();
          if (userData && userData.role === 'admin') {
            logger.log('Admin login success', { uid: user.uid });
            window.location.href = 'dashboard.html';
          } else {
            auth.signOut();
            alert('Access denied. Admin role required.');
            logger.error('Unauthorized login attempt', { uid: user.uid });
          }
        }, { onlyOnce: true });
      } catch (error) {
        alert('Login failed: ' + error.message);
        logger.error('Login failed', error);
      }
    });
  </script>
</body>
</html>
