<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - EV Recharge Bunk</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="card">
      <h1>Admin Login</h1>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>
      <p style="margin-top: 20px; color: #aaa;">
        Don't have an account? <a href="register.html" style="color: #00d4ff;">Register</a>
      </p>
      <p style="margin-top: 10px;">
        <a href="../index.html" style="color: #aaa;">← Back to Home</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { auth, db, Logger } from '../shared/utils.js';
    import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

    const logger = new Logger('AdminLogin');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        logger.log('Admin login attempt', { email });
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        const userDoc = await db.collection('users').doc(user.uid).get();
        const userData = userDoc.data();

        if (userData && userData.role === 'admin') {
          logger.log('Admin login success', { uid: user.uid });
          window.location.href = 'dashboard.html';
        } else {
          await auth.signOut();
          alert('Access denied. Admin role required.');
          logger.error('Unauthorized login attempt', { uid: user.uid });
        }
      } catch (error) {
        alert('Login failed: ' + error.message);
        logger.error('Login failed', error);
      }
    });
  </script>
</body>
</html>
