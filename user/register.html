<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Register - EV Recharge Bunk</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="card">
      <h1>User Registration</h1>
      <form id="registerForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="user@example.com">
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="mobile" required placeholder="+1234567890">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Min 6 characters" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
      </form>
      <p style="margin-top: 20px; color: #aaa;">
        Already have an account? <a href="login.html" style="color: #00d4ff;">Login</a>
      </p>
      <p style="margin-top: 10px;">
        <a href="../index.html" style="color: #aaa;">← Back to Home</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { auth, db, Logger } from '../shared/utils.js';
    import { createUserWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const logger = new Logger('UserRegister');

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const mobile = document.getElementById('mobile').value;
      const password = document.getElementById('password').value;

      try {
        logger.log('User registration attempt', { email });
        
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, 'users', user.uid), {
          email: email,
          mobile: mobile,
          role: 'user',
          createdAt: new Date().toISOString()
        });

        await signOut(auth);
        
        logger.log('User registration success', { uid: user.uid });
        alert('Registration successful! Please login.');
        window.location.href = 'login.html';
      } catch (error) {
        alert('Registration failed: ' + error.message);
        logger.error('Registration failed', error);
      }
    });
  </script>
</body>
</html>
